<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title> CTU-IT Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="login-card">
      <h2 id="title">CTU Cebu Technological University<br>
      <small>Information Technology</small></h2>
      
      <div class="input-group mb-3">
      <input id="username" class="form-control" placeholder="Username">
      </div>
      <div class="input-group mb-3">
      <input id="password" class="form-control" placeholder="Password">
      </div>
      
      <a href="#" class="forgot-pass">Forgot Password?</a>
      <button id="loginBtn" class="Btn Btn-info btn-login">
        <span id="btnText">LOGIN</span>
        <span id="loading" class="spinner-border spinner-border-sm d-none"></span>
      </button>
    </div>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script type="text/babel" src="react.jsx"></script>
  </body>
</html>
